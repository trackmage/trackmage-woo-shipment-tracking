#ENV variables: https://docs.gitlab.com/ce/ci/variables/
image: karser/docker-compose-ci

stages:
    - test
    - deploy

variables:
    npm_config_cache: '$CI_PROJECT_DIR/.cache/npm'

cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
        - .cache/npm
        - .composer/cache/files

before_script:
    - docker -v && docker-compose -v

.run_test: &test_tpl
    stage: test
    variables: &test_vars
        COMPOSE_PROJECT_NAME: 'tm_wp_plugin_test${CI_JOB_ID}'
        COMPOSE_FILE: 'docker/docker-compose.yml'
        GIT_BRANCH: ${CI_COMMIT_BRANCH}
        HPOS_ENABLED: ''
    before_script:
        - echo ${COMPOSE_PROJECT_NAME}
        - npm ci && npm run build && rm -rf node_modules/
        - docker-compose up -d db
        # Wait for the db service directly via exec+ping instead of the old
        # martin/wait sidecar, which fails with "getaddrinfo: Try again" on
        # docker-compose v2 because "run --rm" does not always share the same
        # network as "up -d" services.
        - |
          ok=0
          for i in $(seq 1 60); do
            if docker-compose exec -T db mariadb-admin ping -u root --silent 2>/dev/null; then
              ok=1; break
            fi
            echo "db not ready (attempt $i/60)"
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo '=== docker-compose ps ==='
            docker-compose ps
            echo '=== docker-compose logs db ==='
            docker-compose logs db || true
            exit 1
          fi
        # Force TCP instead of unix socket (the 10.11 image does not expose the
        # socket at the classic /run/mysqld/mysqld.sock path visible to the
        # client CLI).
        - docker-compose exec -T db mariadb -u root -h 127.0.0.1 -e "CREATE DATABASE IF NOT EXISTS wp_test"
        - docker-compose up -d
    script:
        - docker-compose exec -T wp bash -c '/project/docker/bin/install.sh'
        - docker-compose exec -T wp bash -c 'cd /project; make info'
        - docker-compose exec -T wp bash -c 'cd /project; make init'
        - docker-compose exec -T wp bash -c 'cd /project; make test'
    after_script:
        - docker-compose down
    artifacts:
        expire_in: 1 week
        when: always
        paths:
            - tests/_output/*.html
            - build/*.zip

# Verify the compatibility claims added in plugin 2.1.0: WP 6.9 + WC 10.7.
# The rest of the matrix is temporarily disabled to speed up iteration
# while CI is stabilised; restore the commented jobs before tagging 2.1.0.
php83_wp69_wc107_test:
    <<: *test_tpl
    variables:
        <<: *test_vars
        PHP_VERSION: '8.3'
        WORDPRESS_VERSION: '6.9'
        WOOCOMMERCE_VERSION: '10.7.0'
        ZIP_BUILD: 'true'

