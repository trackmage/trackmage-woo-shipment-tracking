publish:
    stage: deploy
    only:
        - tags
    variables:
        GIT_TAG: ${CI_COMMIT_TAG}
    script:
        - ls -alh build
        - unzip -qq build/trackmage-woo-shipment-tracking.zip -d build
        - bin/deploy.sh
