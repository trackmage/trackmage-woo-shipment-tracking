version: '3.2'

services:

#    chromedriver:
#        image: selenium/standalone-chrome:3.141.59-oxygen
#        depends_on:
#            - db
#        extra_hosts:
#            - "wp.test:127.0.0.1"

    db:
        # 10.11 is the current LTS; the previous pin (10.3.6, 2018) was not
        # built with SSL support and the modern mariadb-client requires TLS
        # by default, which made wp db export fail with "SSL is required".
        image: mariadb:10.11
        # mariadb 10.5+ uses POSIX timer_create() which the default docker
        # seccomp profile on older daemons (the shared CI runner) blocks,
        # causing "Can't initialize timers" on startup. The wp service has
        # the same unconfined profile for the PHP test runner.
        security_opt:
            - seccomp:unconfined
        # Shrink InnoDB footprint so the init step does not fail with
        # error 28 (ENOSPC) when preallocating log files on overlayfs (the
        # 10.11 default is a 96MiB log file that fallocate cannot extend
        # on the CI runner's layered filesystem). These settings are only
        # used for CI throwaway data.
        command:
            - mariadbd
            - --innodb-log-file-size=8M
            - --innodb-buffer-pool-size=64M
            - --innodb-doublewrite=0
        # Mount /var/lib/mysql as tmpfs so it bypasses the runner's docker
        # overlayfs, which is full enough that even a few-KB ddl_recovery.log
        # write returns ENOSPC. Data is throwaway for CI, RAM is fine.
        tmpfs:
            - /var/lib/mysql
        environment:
            MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
            MARIADB_DATABASE: wp_site
            MARIADB_USER: wordpress
            MARIADB_PASSWORD: wordpress
            # Legacy MYSQL_* aliases kept for older mariadb images, harmless on 10.11.
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_DATABASE: wp_site
            MYSQL_USER: wordpress
            MYSQL_PASSWORD: wordpress

    wp:
        image: wordpress:php${PHP_VERSION:-7.4}-fpm
        depends_on:
            - db
        security_opt:
            - seccomp:unconfined
        environment:
            WORDPRESS_DB_NAME: wp_site
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: root
            WORDPRESS_DB_PASSWORD: ''
            COMPOSER_HOME: '/project/.composer'
            # important: pass variables to Makefile
            PHP_VERSION: ${PHP_VERSION}
            WORDPRESS_VERSION: ${WORDPRESS_VERSION}
            WOOCOMMERCE_VERSION: ${WOOCOMMERCE_VERSION}
            HPOS_ENABLED: ${HPOS_ENABLED}
            ZIP_BUILD: ${ZIP_BUILD}
            GIT_BRANCH: ${GIT_BRANCH}
            GITHUB_TOKEN: ${GITHUB_TOKEN}
            CI_JOB_URL: ${CI_JOB_URL}
        volumes:
            - ./..:/project

    waiter:
        image: martin/wait
        depends_on:
            - db
        environment:
            - db_TCP=tcp://db:3306
