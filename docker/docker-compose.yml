version: '3.2'

services:

#    chromedriver:
#        image: selenium/standalone-chrome:3.141.59-oxygen
#        depends_on:
#            - db
#        extra_hosts:
#            - "wp.test:127.0.0.1"

    db:
        # 10.11 is the current LTS; the previous pin (10.3.6, 2018) was not
        # built with SSL support and the modern mariadb-client requires TLS
        # by default, which made wp db export fail with "SSL is required".
        image: mariadb:10.11
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_DATABASE: wp_site
            MYSQL_USER: wordrpess
            MYSQL_PASSWORD: wordpress
        # --debug-no-sync is only available in debug builds of mariadb, which
        # the official 10.11 release image is not. Use innodb_flush_log_at_trx_commit=0
        # to get equivalent "skip fsync for speed" behaviour in release builds.
        command: mysqld --innodb-flush-log-at-trx-commit=0 --sync-binlog=0

    wp:
        image: wordpress:php${PHP_VERSION:-7.4}-fpm
        depends_on:
            - db
        security_opt:
            - seccomp:unconfined
        environment:
            WORDPRESS_DB_NAME: wp_site
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: root
            WORDPRESS_DB_PASSWORD: ''
            COMPOSER_HOME: '/project/.composer'
            # important: pass variables to Makefile
            PHP_VERSION: ${PHP_VERSION}
            WORDPRESS_VERSION: ${WORDPRESS_VERSION}
            WOOCOMMERCE_VERSION: ${WOOCOMMERCE_VERSION}
            HPOS_ENABLED: ${HPOS_ENABLED}
            ZIP_BUILD: ${ZIP_BUILD}
            GIT_BRANCH: ${GIT_BRANCH}
            GITHUB_TOKEN: ${GITHUB_TOKEN}
            CI_JOB_URL: ${CI_JOB_URL}
        volumes:
            - ./..:/project

    waiter:
        image: martin/wait
        depends_on:
            - db
        environment:
            - db_TCP=tcp://db:3306
