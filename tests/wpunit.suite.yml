# Codeception Test Suite Configuration
#
# Suite for unit or integration tests that require WordPress functions and classes.

actor: WpunitTester
modules:
    enabled:
        - WPLoader
        - \Helper\Wpunit
    config:
        WPLoader:
            wpRootFolder: "%WP_ROOT_FOLDER%"
            dbName: "%TEST_DB_NAME%"
            dbHost: "%TEST_DB_HOST%"
            dbUser: "%TEST_DB_USER%"
            dbPassword: "%TEST_DB_PASSWORD%"
            tablePrefix: "%TEST_TABLE_PREFIX%"
            domain: "%TEST_SITE_WP_DOMAIN%"
            adminEmail: "%TEST_SITE_ADMIN_EMAIL%"
            title: "Test"
            isolatedInstall: false
            # Both load (require_once the main file) AND activate are needed:
            # activatePlugins alone only writes the active_plugins option, it
            # does not require the plugin file, so WC() stays undefined when
            # tests start under newer wp-browser versions.
            plugins:
                - woocommerce/woocommerce.php
                - trackmage-woo-shipment-tracking/trackmage.php
            activatePlugins:
                - woocommerce/woocommerce.php
                - trackmage-woo-shipment-tracking/trackmage.php
